name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='AUDIT.md' \
            --exclude='_hostinger-upload' \
            --exclude='_deploy' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='**/config.local.php' \
            ./ _deploy/
          echo "--- Contenido de _deploy ---"
          ls -la _deploy/

      - name: Install lftp + sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp sshpass

      - name: Deploy via lftp SFTP (incluye dotfiles)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_PORT: ${{ secrets.FTP_PORT }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: '/home/u545413471/domains/nativosconsultora.com.ar/public_html'
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:timeout 30;
            open -u \"$SFTP_USER\",\"$SFTP_PASS\" sftp://$SFTP_HOST:$SFTP_PORT;
            mirror --reverse --verbose --parallel=4 \
                   --exclude-glob .git/ \
                   --exclude-glob .github/ \
                   --exclude AUDIT.md \
                   --exclude-glob _hostinger-upload/ \
                   ./_deploy/ $REMOTE_DIR;
            bye
          "
