name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='AUDIT.md' \
            --exclude='_hostinger-upload' \
            --exclude='_deploy' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='**/config.local.php' \
            ./ _deploy/
          echo "--- Contenido de _deploy ---"
          ls -la _deploy/

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './_deploy/'
          remote_path: '/home/u545413471/domains/nativosconsultora.com.ar/public_html'
          sftp_only: true
          delete_remote_files: false
